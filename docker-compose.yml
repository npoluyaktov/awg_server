version: "3.8"

services:
  amnezia-awg:
    build: .
    container_name: amnezia-awg
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    environment:
      - AWG_SERVER_PORT=51820
      - AWG_EXTERNAL_IP=1.2.3.4          # ЗАМЕНИТЕ на внешний IP вашего VPS
      - AWG_INTERNAL_SUBNET=10.8.0.0/16
    ports:
      - "51820:51820/udp"
    volumes:
      - awg_data:/opt/amnezia/awg
      - wireguard_data:/etc/wireguard

volumes:
  awg_data:
  wireguard_data: