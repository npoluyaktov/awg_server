version: "3.8"

services:
  amneziawg-go:
    build:
      context: .
      dockerfile: Dockerfile
    image: amneziawg-go:latest
    container_name: amneziawg-go
    restart: unless-stopped
    
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    
    devices:
      - /dev/net/tun:/dev/net/tun
    
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.conf.all.rp_filter=2
      - net.core.default_qdisc=fq
      - net.ipv4.tcp_congestion_control=bbr
    
    environment:
      # Основные
      - AWG_SERVER_PORT=51820
      - AWG_EXTERNAL_IP=ВАШ_РЕАЛЬНЫЙ_IP
      
      # Параметры маскировки (AmneziaWG)
      - AWG_JUNK_PACKET_COUNT=10
      - AWG_JUNK_PACKET_MIN_SIZE=50
      - AWG_JUNK_PACKET_MAX_SIZE=1000
      - AWG_INIT_PACKET_JUNK=15
      - AWG_RESPONSE_PACKET_JUNK=15
      
      # Magic Headers (для совместимости с разными версиями)
      - AWG_INIT_PACKET_MAGIC_HEADER=1
      - AWG_RESPONSE_PACKET_MAGIC_HEADER=2
      - AWG_UNDERLOAD_PACKET_MAGIC_HEADER=3
      - AWG_TRANSPORT_PACKET_MAGIC_HEADER=4
    
    ports:
      - "51820:51820/udp"
    
    volumes:
      - awg_config:/opt/amnezia/awg
      - wireguard_config:/etc/wireguard
    
    networks:
      - awg_network
    
    healthcheck:
      test: ["CMD", "awg", "show", "wg0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  awg_network:
    driver: bridge

volumes:
  awg_config:
    driver: local
  wireguard_config:
    driver: local
